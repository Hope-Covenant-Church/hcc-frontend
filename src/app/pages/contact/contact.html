<section class="page-hero contact-hero">
  <div class="page-hero-content">
    <h1>CONTACT</h1>
  </div>
  <div class="scroll-indicator">
    <span class="chevron"></span>
  </div>
</section>

<section class="content-section">
  <div class="container">
    <div class="contact-layout">
      <div class="contact-map-block">
        <h2 class="contact-heading">FIND US</h2>
        <div class="map-container">
          <iframe
            src="https://www.google.com/maps?q=14+Cutten+St+Horison+Roodepoort&output=embed"
            width="100%"
            height="100%"
            style="border:0;border-radius:8px;"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            title="Church location">
          </iframe>
        </div>
        <div class="contact-details">
          <p><strong>Address:</strong> <a href="https://maps.google.com/?q=14+Cutten+St+Horison+Roodepoort" target="_blank" rel="noopener">14 Cutten St, Horison</a></p>
          <p><strong>Phone:</strong> Michael Marsland - 083 555 6607</p>
          <p><strong>Email:</strong> <a [href]="'mailto:' + email">admin@hopecovenant.co.za</a></p>
        </div>
      </div>
      <div class="contact-form-block">
        <h2 class="contact-heading">SEND US A MESSAGE</h2>
        <form action="https://formsubmit.co/admin@hopecovenant.co.za" method="POST" class="contact-form">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required placeholder="Your name">
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="Your email address">
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" required placeholder="Your message"></textarea>
          </div>
          <button type="submit" class="btn">SEND</button>
        </form>
      </div>
    </div>
  </div>
</section>
